<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 חמ"ל מבזקים וחירום</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #1c1e21;
            --header-bg: #2c3e50;
            --item-bg: white;
            --border-color: #333;
        }

        /* הגדרות מצב לילה */
        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #e4e6eb;
            --header-bg: #000000;
            --item-bg: #242526;
            --border-color: #444;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; color: white; transition: 0.3s; }
        
        .top-bar { background: #000; padding: 5px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; border-bottom: 1px solid #444; }
        .weather-info { color: #3498db; font-weight: bold; }
        .clock-info { color: #f1c40f; font-weight: bold; text-align: left; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        
        .news-side { width: 450px; background: var(--bg-color); display: flex; flex-direction: column; border-left: 4px solid var(--border-color); transition: 0.3s; }
        .map-side { flex: 1; background: #000; }

        .header { background: var(--header-bg); color: white; padding: 12px; text-align: center; margin: 0; font-size: 1.1rem; border-bottom: 2px solid #1a1a1a; display: flex; justify-content: center; align-items: center; gap: 12px; }
        .refresh-btn { background: #34495e; color: white; border: 1px solid #ecf0f1; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }

        #feed { flex: 1; overflow-y: auto; padding: 15px; background: var(--bg-color); }
        .news-item { background: var(--item-bg); display: block; text-decoration: none; padding: 15px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); border-right: 12px solid #ccc; transition: 0.2s; color: var(--text-color); }
        
        .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .badge { font-size: 0.8rem; font-weight: bold; padding: 4px 10px; border-radius: 5px; color: white; }
        .time { font-size: 0.9rem; color: #1240dd; font-weight: bold; }
        body.dark-mode .time { color: #5dade2; }
        .title { font-size: 1.05rem; line-height: 1.5; font-weight: 600; display: block; }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .news-side, .map-side { width: 100%; height: 50vh; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="weather" class="weather-info">טוען מזג אוויר...</div>
    <div id="clock" class="clock-info">טוען זמן...</div>
</div>

<div class="main-layout">
    <div class="news-side">
        <h2 class="header">מבזקי חדשות <button class="refresh-btn" onclick="fetchNews()">🔄 רענן</button></h2>
        <div id="feed">טוען מבזקים...</div>
    </div>

    <div class="map-side">
        <h2 class="header" style="background: #8e44ad;">מפת צבע אדום בזמן אמת</h2>
        <iframe src="https://www.tzevaadom.co.il/" style="width:100%; height:100%; border:none;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4ncDieZ3xZKsaBVMbXt6vQkyyWaEFeyt4uWlx9JBIdvi5rS4G4w-HUXKx9MjpMCH4/exec';
    
    // 1. ניהול שעון ותאריך עברי
    async function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        
        // שליחת בקשה לתאריך עברי פעם ביום (או בטעינה)
        if (!window.hebrewDate) {
            try {
                const res = await fetch('https://www.hebcal.com/etc/hdate-he.js');
                const text = await res.text();
                window.hebrewDate = text.replace('document.write(', '').replace(');', '').replace(/'/g, '');
            } catch (e) { window.hebrewDate = ""; }
        }

        document.getElementById('clock').innerHTML = `${window.hebrewDate} | ${timeStr}`;
        
        // בדיקת מצב לילה אוטומטי (בין 18:00 ל-06:00)
        const hour = now.getHours();
        if (hour >= 18 || hour < 6) {
            document.body.classList.add('dark-mode');
        } else {
            document.body.classList.remove('dark-mode');
        }
    }

    // 2. מזג אוויר (לפי מיקום כללי בישראל)
    async function fetchWeather() {
        try {
            // שימוש ב-API חופשי למזג אוויר בפתח תקווה/מרכז
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=32.09&longitude=34.88&current_weather=true');
            const data = await res.json();
            const temp = Math.round(data.current_weather.temperature);
            document.getElementById('weather').innerHTML = `🌡️ מרכז: ${temp}°C`;
        } catch (e) { document.getElementById('weather').innerHTML = "מזג אוויר לא זמין"; }
    }

    // 3. ניהול המבזקים (הקוד הקיים שלך)
    function getSourceDetails(sourceName) {
        const name = (sourceName || "").toLowerCase().trim();
        if (name.includes('rotter')) return { label: 'רוטר', color: '#d35400' };
        if (name.includes('ynet'))   return { label: 'Ynet', color: '#ed1c24' };
        if (name.includes('inn') || name.includes('7')) return { label: 'ערוץ 7', color: '#f39c12' };
        return { label: 'מבזק', color: '#666' };
    }

    async function fetchNews() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            const feed = document.getElementById('feed');
            feed.innerHTML = data.map(item => {
                const timeStr = new Date(item.pubDate).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
                const source = getSourceDetails(item.source);
                return `
                    <a href="${item.link}" target="_blank" class="news-item" style="border-right-color: ${source.color};">
                        <div class="meta">
                            <span class="badge" style="background-color: ${source.color};">${source.label}</span>
                            <span class="time">${timeStr}</span>
                        </div>
                        <span class="title">${item.title}</span>
                    </a>`;
            }).join('');
        } catch (e) { console.error(e); }
    }

    // הפעלה ראשונית וטיימרים
    setInterval(updateClock, 1000);
    setInterval(fetchNews, 60000);
    setInterval(fetchWeather, 1800000); // רענון מזג אוויר כל חצי שעה
    updateClock();
    fetchNews();
    fetchWeather();
</script>
</body>
</html>
