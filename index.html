<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 חמ"ל מבזקים וחירום</title>
    <style>
        :root {
            --bg-side: #f0f2f5;
            --text-main: #1c1e21;
            --item-bg: #ffffff;
            --header-bg: #2c3e50;
        }

        /* מצב לילה אוטומטי */
        body.dark-mode {
            --bg-side: #1a1a1a;
            --text-main: #e4e6eb;
            --item-bg: #242526;
            --header-bg: #000000;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #000; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; color: white; }
        
        /* סרגל עליון - שעון ומזג אוויר */
        .top-bar { background: #111; padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; font-size: 0.95rem; }
        #weather { color: #3498db; font-weight: bold; }
        #clock { color: #f1c40f; font-weight: bold; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        
        /* עמודת מבזקים */
        .news-side { width: 450px; background: var(--bg-side); display: flex; flex-direction: column; border-left: 4px solid #333; transition: 0.3s; }
        .map-side { flex: 1; background: #000; position: relative; }

        .header { background: var(--header-bg); color: white; padding: 12px; text-align: center; margin: 0; font-size: 1.1rem; border-bottom: 2px solid #111; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .refresh-btn { background: #34495e; color: white; border: 1px solid #eee; padding: 3px 8px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }

        #feed { flex: 1; overflow-y: auto; padding: 15px; }
        .news-item { background: var(--item-bg); color: var(--text-main); display: block; text-decoration: none; padding: 15px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); border-right: 10px solid #ccc; }
        
        .meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .badge { font-size: 0.75rem; font-weight: bold; padding: 3px 8px; border-radius: 4px; color: white; }
        .time { font-size: 0.85rem; font-weight: bold; color: #1240dd; }
        body.dark-mode .time { color: #5dade2; }
        .title { font-size: 1rem; line-height: 1.4; font-weight: 600; display: block; }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .news-side { width: 100%; height: 50vh; }
        }
    </style>
</head>
<body class="dark-mode"> <div class="top-bar">
    <div id="weather">טוען מזג אוויר...</div>
    <div id="clock">טוען זמן...</div>
</div>

<div class="main-layout">
    <div class="news-side">
        <h2 class="header">מבזקי חדשות <button class="refresh-btn" onclick="fetchNews()">🔄 רענן</button></h2>
        <div id="feed">טוען מבזקים...</div>
    </div>

    <div class="map-side">
        <h2 class="header" style="background: #8e44ad;">מפת צבע אדום בזמן אמת</h2>
        <iframe src="https://www.tzevaadom.co.il/" style="width:100%; height:100%; border:none;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4ncDieZ3xZKsaBVMbXt6vQkyyWaEFeyt4uWlx9JBIdvi5rS4G4w-HUXKx9MjpMCH4/exec';
    
    // שעון ותאריך עברי
    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const dateStr = now.toLocaleDateString('he-IL', options);
        
        document.getElementById('clock').innerHTML = dateStr + " | " + timeStr;
        
        // מצב לילה אוטומטי (18:00 עד 06:00)
        const hour = now.getHours();
        if (hour >= 18 || hour < 6) { document.body.classList.add('dark-mode'); } 
        else { document.body.classList.remove('dark-mode'); }
    }

    // מזג אוויר
    async function fetchWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=32.09&longitude=34.88&current_weather=true');
            const data = await res.json();
            document.getElementById('weather').innerHTML = `🌡️ טמפרטורה: ${Math.round(data.current_weather.temperature)}°C`;
        } catch (e) { document.getElementById('weather').innerHTML = "מזג אוויר זמין"; }
    }

    // מבזקים
    async function fetchNews() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            const feed = document.getElementById('feed');
            
            feed.innerHTML = data.map(item => {
                const timeStr = new Date(item.pubDate).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
                const source = (item.source || "").toLowerCase();
                let color = "#666", label = "מבזק";

                if (source.includes('rotter')) { color = "#d35400"; label = "רוטר"; }
                else if (source.includes('ynet')) { color = "#ed1c24"; label = "Ynet"; }
                else if (source.includes('inn') || source.includes('7')) { color = "#f39c12"; label = "ערוץ 7"; }

                return `
                    <a href="${item.link}" target="_blank" class="news-item" style="border-right-color: ${color};">
                        <div class="meta">
                            <span class="badge" style="background-color: ${color};">${label}</span>
                            <span class="time">${timeStr}</span>
                        </div>
                        <span class="title">${item.title}</span>
                    </a>`;
            }).join('');
        } catch (e) { document.getElementById('feed').innerHTML = "שגיאה בטעינה. נסה לרענן."; }
    }

    setInterval(updateClock, 1000);
    setInterval(fetchNews, 60000);
    updateClock();
    fetchNews();
    fetchWeather();
</script>
</body>
</html>
