<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 חמ"ל מבצעי - גרסה מתוקנת</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --panel: #242526;
            --text: #e4e6eb;
            --accent: #3498db;
            --header: #000000;
        }

        body { font-family: system-ui, sans-serif; background: #000; margin: 0; padding: 0; height: 100vh; color: white; overflow: hidden; display: flex; flex-direction: column; }
        
        .top-bar { height: 70px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid #444; flex-shrink: 0; }
        #weather { color: var(--accent); font-weight: bold; font-size: 1.1rem; }
        #clock-container { text-align: left; }
        #clock-hebrew { color: #f1c40f; font-weight: bold; font-size: 1.1rem; }
        #clock-gregorian { color: #888; font-size: 0.8rem; }

        .main-layout { display: flex; flex: 1; position: relative; overflow: hidden; }
        
        .news-side { width: 420px; background: var(--bg); display: flex; flex-direction: column; border-left: 4px solid #333; transition: 0.3s ease; z-index: 10; }
        .news-side.hidden { margin-right: -420px; }

        .section { height: 50%; display: flex; flex-direction: column; overflow: hidden; border-bottom: 2px solid #333; }
        .header { background: var(--header); padding: 10px; text-align: center; font-size: 1rem; border-bottom: 1px solid #444; font-weight: bold; }

        #feed { flex: 1; overflow-y: auto; padding: 10px; }
        .news-item { background: var(--panel); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-right: 6px solid #666; text-decoration: none; color: var(--text); display: block; }
        .meta { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px; }
        .badge { padding: 2px 6px; border-radius: 4px; color: white; font-weight: bold; }
        
        /* טלגרם - שימוש בווידג'ט הרשמי */
        .tg-container { flex: 1; background: #fff; overflow-y: auto; padding: 5px; }

        .map-side { flex: 1; position: relative; background: #000; }
        
        #toggle-btn { 
            position: absolute; top: 15px; right: 15px; z-index: 1000; 
            background: #2c3e50; color: white; border: 2px solid #fff; 
            border-radius: 50%; width: 40px; height: 40px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="weather">🌡️ 20°C</div>
    <div id="clock-container">
        <div id="clock-gregorian">--/--/----</div>
        <div id="clock-hebrew">טוען תאריך...</div>
    </div>
</div>

<div class="main-layout">
    <div class="news-side" id="newsSide">
        <div class="section">
            <div class="header">📢 מבזקי חדשות (רוטר / Ynet / ערוץ 7)</div>
            <div id="feed">טוען נתונים...</div>
        </div>
        <div class="section">
            <div class="header" style="background: #0088cc;">📱 טלגרם: התרעה חריגה</div>
            <div class="tg-container">
                <script async src="https://telegram.org/js/telegram-widget.js?22" 
                        data-telegram-post="Criticalalerts/10" 
                        data-width="100%" 
                        data-userpic="false"></script>
                <div style="text-align: center; margin-top: 10px;">
                    <a href="https://t.me/s/Criticalalerts" target="_blank" style="color: #0088cc; font-size: 0.8rem; text-decoration: none;">לצפייה בערוץ המלא לחץ כאן ↗</a>
                </div>
            </div>
        </div>
    </div>

    <div class="map-side">
        <button id="toggle-btn" onclick="toggleNews()">></button>
        <iframe src="https://www.tzevaadom.co.il/"></iframe>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4ncDieZ3xZKsaBVMbXt6vQkyyWaEFeyt4uWlx9JBIdvi5rS4G4w-HUXKx9MjpMCH4/exec";

    function toGematria(num) {
        const letters = { 400:'ת', 300:'ש', 200:'ר', 100:'ק', 90:'צ', 80:'פ', 70:'ע', 60:'ס', 50:'נ', 40:'מ', 30:'ל', 20:'כ', 10:'י', 9:'ט', 8:'ח', 7:'ז', 6:'ו', 5:'ה', 4:'ד', 3:'ג', 2:'ב', 1:'א' };
        let result = '';
        if (num === 15) return 'טו';
        if (num === 16) return 'טז';
        for (let val of Object.keys(letters).sort((a, b) => b - a)) {
            while (num >= val) {
                result += letters[val];
                num -= val;
            }
        }
        return result;
    }

    function updateClock() {
        const now = new Date();
        const hebDate = new Intl.DateTimeFormat('he-u-ca-hebrew', {day:'numeric', month:'long', year:'numeric'}).format(now);
        const parts = hebDate.split(' ');
        const dayG = toGematria(parseInt(parts[0]));
        
        // תיקון שנה: לוקחים 5786 -> 786 -> תשפ"ו. מוסיפים ה' -> התשפ"ו.
        const yearFull = parseInt(parts[2]);
        const yearNum = yearFull > 5000 ? yearFull - 5000 : yearFull;
        const yearG = "ה" + toGematria(yearNum);

        document.getElementById("clock-gregorian").innerText = now.toLocaleDateString('he-IL');
        document.getElementById("clock-hebrew").innerText = `${dayG} ${parts[1]} ${yearG} | ${now.toLocaleTimeString('he-IL')}`;
    }

    function toggleNews() {
        const side = document.getElementById("newsSide");
        const btn = document.getElementById("toggle-btn");
        const isHidden = side.classList.toggle("hidden");
        btn.innerText = isHidden ? "<" : ">";
    }

    async function fetchNews() {
        try {
            const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
            const data = await res.json();
            if (!data) return;
            document.getElementById("feed").innerHTML = data.map(item => {
                const time = new Date(item.pubDate).toLocaleTimeString("he-IL", {hour: "2-digit", minute: "2-digit"});
                const src = (item.source || "").toLowerCase();
                let color = "#666", label = "מבזק";
                
                if (src.includes("rotter")) { color = "#d35400"; label = "רוטר"; }
                else if (src.includes("7") || src.includes("inn")) { color = "#ff8c00"; label = "ערוץ 7"; }
                else if (src.includes("ynet")) { color = "#ed1c24"; label = "Ynet"; }
                
                return `<a href="${item.link}" target="_blank" class="news-item" style="border-right-color: ${color}">
                    <div class="meta"><span class="badge" style="background:${color}">${label}</span><span>${time}</span></div>
                    <div class="title">${item.title}</div>
                </a>`;
            }).join("");
        } catch (e) {}
    }

    updateClock();
    fetchNews();
    setInterval(updateClock, 1000);
    setInterval(fetchNews, 60000);
</script>

</body>
</html>
