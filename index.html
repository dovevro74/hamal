<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 חמ"ל מבזקים וחירום</title>
    <style>
        :root {
            --bg-side: #1a1a1a;
            --text-main: #e4e6eb;
            --item-bg: #242526;
            --header-bg: #000000;
            --top-h: 70px;
        }

        body { font-family: system-ui, -apple-system, sans-serif; background: #000; margin: 0; padding: 0; height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; color: white; }
        
        /* סרגל עליון */
        .top-bar { 
            height: var(--top-h); 
            background: #111; 
            padding: 0 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #444; 
            flex-shrink: 0;
            z-index: 2000;
        }
        .top-left { display: flex; align-items: center; gap: 15px; }
        #weather { color: #3498db; font-weight: bold; font-size: 1.1rem; }
        #clock-container { text-align: left; line-height: 1.2; }
        #clock-hebrew { color: #f1c40f; font-weight: bold; font-size: 1rem; }
        #clock-gregorian { color: #888; font-size: 0.8rem; }

        .main-layout { display: flex; height: calc(100vh - var(--top-h)); width: 100%; position: relative; }
        
        /* טור צד */
        .news-side { 
            width: 420px; 
            min-width: 420px; 
            background: var(--bg-side); 
            display: flex; 
            flex-direction: column; 
            border-left: 4px solid #333; 
            transition: transform 0.3s ease;
            z-index: 10;
        }
        .news-side.hidden { transform: translateX(100%); width: 0; min-width: 0; }

        .news-section { height: 45%; display: flex; flex-direction: column; overflow: hidden; border-bottom: 2px solid #333; }
        .telegram-section { height: 55%; display: flex; flex-direction: column; overflow: hidden; background: #1a1a1a; }

        #tg-container { flex: 1; overflow-y: auto; padding: 10px; text-align: center; }

        .map-side { flex: 1; background: #000; position: relative; }

        /* כפתור הסתרה (החץ) */
        #toggle-btn {
            position: absolute;
            top: 50%;
            right: 420px;
            transform: translateY(-50%);
            z-index: 2001;
            background: #2c3e50;
            color: white;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: right 0.3s ease;
        }
        .hidden + .map-side #toggle-btn { right: 10px; }

        .header { background: var(--header-bg); color: white; padding: 10px; text-align: center; margin: 0; font-size: 1rem; border-bottom: 1px solid #333; }

        /* עיצוב מבזקים עם אייקונים */
        #feed { flex: 1; overflow-y: auto; padding: 15px; }
        .news-item { 
            background: var(--item-bg); 
            color: var(--text-main); 
            display: block; 
            text-decoration: none; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 10px; 
            border-right: 8px solid #666; 
        }
        .meta { display: flex; justify-content: space-between; margin-bottom: 5px; align-items: center; }
        .badge { font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; color: white; text-transform: uppercase; }
        .time { font-size: 0.8rem; font-weight: bold; color: #5dade2; }
        .title { font-size: 0.9rem; line-height: 1.4; font-weight: 600; }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="top-left">
        <div id="weather">טוען...</div>
        <div style="color: #3498db; font-weight: bold; font-size: 1.2rem; margin-right: 15px;">📡 חמ"ל מבצעי</div>
    </div>
    <div id="clock-container">
        <div id="clock-gregorian">--/--/----</div>
        <div id="clock-hebrew">טוען תאריך...</div>
    </div>
</div>

<div class="main-layout">
    <div class="news-side" id="newsSide">
        <div class="news-section">
            <h2 class="header">מבזקי חדשות <button onclick="fetchNews()" style="background:none; border:none; color:white; cursor:pointer; font-size: 1rem;">🔄</button></h2>
            <div id="feed">טוען מבזקים...</div>
        </div>

        <div class="telegram-section">
            <h2 class="header" style="background: #0088cc;">📱 התראות טלגרם (חי)</h2>
            <div id="tg-container">
                <script async src="https://telegram.org/js/telegram-widget.js?22" 
                        data-telegram-channel="Criticalalerts" 
                        data-limit="10" 
                        data-dark="1"></script>
            </div>
        </div>
    </div>

    <div class="map-side">
        <div id="toggle-btn" onclick="toggleNews()">▶</div>
        <iframe src="https://www.tzevaadom.co.il/"></iframe>
    </div>
</div>
