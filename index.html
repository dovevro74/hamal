<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 חמ"ל מבצעי סופי</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --panel: #242526;
            --text: #e4e6eb;
            --accent: #3498db;
            --header: #000000;
        }

        body { font-family: system-ui, -apple-system, sans-serif; background: #000; margin: 0; padding: 0; height: 100vh; color: white; overflow: hidden; display: flex; flex-direction: column; }
        
        /* סרגל עליון */
        .top-bar { height: 70px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid #333; flex-shrink: 0; }
        #weather { color: var(--accent); font-weight: bold; font-size: 1.2rem; }
        #clock-container { text-align: left; }
        #clock-hebrew { color: #f1c40f; font-weight: bold; font-size: 1.1rem; }
        #clock-gregorian { color: #888; font-size: 0.8rem; }

        .main-layout { display: flex; flex: 1; position: relative; overflow: hidden; }
        
        /* טור מבזקים */
        .news-side { width: 420px; background: var(--bg); display: flex; flex-direction: column; border-left: 4px solid #333; transition: 0.3s; z-index: 10; }
        .news-side.hidden { transform: translateX(100%); width: 0; }

        .section { height: 50%; display: flex; flex-direction: column; overflow: hidden; border-bottom: 2px solid #333; }
        .header { background: var(--header); padding: 10px; text-align: center; font-size: 1rem; border-bottom: 1px solid #444; }

        #feed { flex: 1; overflow-y: auto; padding: 10px; }
        .news-item { background: var(--panel); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-right: 6px solid #666; text-decoration: none; color: var(--text); display: block; }
        .meta { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px; }
        .badge { padding: 2px 6px; border-radius: 4px; color: white; font-weight: bold; }
        
        /* טלגרם */
        .tg-frame { flex: 1; border: none; background: #fff; width: 100%; }

        /* מפה */
        .map-side { flex: 1; position: relative; background: #000; }
        #toggle-btn { position: absolute; top: 50%; right: 420px; transform: translateY(-50%); z-index: 100; background: #2c3e50; color: white; border: 2px solid #fff; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="weather">☀️ 24°C</div>
    <div id="clock-container">
        <div id="clock-gregorian">--/--/----</div>
        <div id="clock-hebrew">טוען תאריך...</div>
    </div>
</div>

<div class="main-layout">
    <div class="news-side" id="newsSide">
        <div class="section">
            <div class="header">📢 מבזקי חדשות</div>
            <div id="feed">טוען נתונים...</div>
        </div>
        <div class="section" style="height: 50%;">
            <div class="header" style="background: #0088cc;">📱 טלגרם: התרעה חריגה</div>
            <iframe class="tg-frame" src="https://t.me/s/Criticalalerts"></iframe>
        </div>
    </div>

    <div class="map-side">
        <div id="toggle-btn" onclick="toggleNews()">▶</div>
        <iframe src="https://www.tzevaadom.co.il/"></iframe>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4ncDieZ3xZKsaBVMbXt6vQkyyWaEFeyt4uWlx9JBIdvi5rS4G4w-HUXKx9MjpMCH4/exec";

    // פונקציית תאריך עברי ידנית ללא תלות בספריות חיצוניות
    function getHebrewDate() {
        const now = new Date();
        const options = { day: 'numeric', month: 'long', year: 'numeric', calendar: 'hebrew' };
        try {
            return new Intl.DateTimeFormat('he-u-ca-hebrew', options).format(now).replace('ב', '');
        } catch(e) { return ""; }
    }

    function updateClock() {
        const now = new Date();
        document.getElementById("clock-gregorian").innerText = now.toLocaleDateString('he-IL');
        document.getElementById("clock-hebrew").innerText = getHebrewDate() + " | " + now.toLocaleTimeString('he-IL');
    }

    function toggleNews() {
        const side = document.getElementById("newsSide");
        const btn = document.getElementById("toggle-btn");
        const isHidden = side.classList.toggle("hidden");
        btn.style.right = isHidden ? "10px" : "420px";
        btn.innerText = isHidden ? "◀" : "▶";
    }

    async function fetchNews() {
        try {
            const response = await fetch(SCRIPT_URL + "?t=" + Date.now());
            const data = await response.json();
            if (!data || data.length === 0) return;

                const time = new Date(item.pubDate).toLocaleTimeString("he-IL", {hour: "2-digit", minute: "2-digit"});
                let color = "#666", label = "מבזק";
                const src = (item.source || "").toLowerCase();
