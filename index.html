<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 חמ"ל מבצעי - עדכון רוטר וטלגרם</title>
    <style>
        :root { --bg: #1a1a1a; --panel: #242526; --text: #e4e6eb; }
        body { font-family: system-ui, sans-serif; background: #000; margin: 0; padding: 0; height: 100vh; color: white; overflow: hidden; display: flex; flex-direction: column; }
        .top-bar { height: 70px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid #444; }
        #clock-hebrew { color: #f1c40f; font-weight: bold; font-size: 1.1rem; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .news-side { width: 420px; background: var(--bg); display: flex; flex-direction: column; border-left: 4px solid #333; }
        .section { height: 50%; display: flex; flex-direction: column; overflow: hidden; border-bottom: 2px solid #333; }
        .header { background: #000; padding: 10px; text-align: center; font-size: 1rem; border-bottom: 1px solid #444; font-weight: bold; }
        #feed { flex: 1; overflow-y: auto; padding: 10px; }
        .news-item { background: var(--panel); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-right: 6px solid #666; text-decoration: none; color: var(--text); display: block; }
        .badge { padding: 2px 6px; border-radius: 4px; color: white; font-weight: bold; font-size: 0.8rem; }
        
        /* טלגרם Widget - רקע לבן כדי שהטקסט יהיה קריא */
        .tg-container { flex: 1; background: #fff; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .map-side { flex: 1; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="weather">🌡️ טוען...</div>
    <div id="clock-container" style="text-align: left;">
        <div id="clock-gregorian" style="color: #888; font-size: 0.8rem;">--/--/----</div>
        <div id="clock-hebrew">טוען תאריך...</div>
    </div>
</div>

<div class="main-layout">
    <div class="news-side">
        <div class="section">
            <div class="header">📢 מבזקים: רוטר / Ynet / ערוץ 7</div>
            <div id="feed">מחפש מבזקים...</div>
        </div>
        <div class="section">
            <div class="header" style="background: #0088cc;">📱 טלגרם: עדכונים חיים</div>
            <div class="tg-container">
                <script async src="https://telegram.org/js/telegram-widget.js?22" 
                        data-telegram-post="Criticalalerts/10" 
                        data-width="100%" 
                        data-userpic="false"></script>
                <div style="margin-top: 15px;">
                    <a href="https://t.me/s/Criticalalerts" target="_blank" style="color: #0088cc; font-weight: bold; text-decoration: none;">↗ לצפייה בערוץ המלא</a>
                </div>
            </div>
        </div>
    </div>
    <div class="map-side">
        <iframe src="https://www.tzevaadom.co.il/"></iframe>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4ncDieZ3xZKsaBVMbXt6vQkyyWaEFeyt4uWlx9JBIdvi5rS4G4w-HUXKx9MjpMCH4/exec";

    function toGematria(num) {
        const letters = { 400:'ת', 300:'ש', 200:'ר', 100:'ק', 90:'צ', 80:'פ', 70:'ע', 60:'ס', 50:'נ', 40:'מ', 30:'ל', 20:'כ', 10:'י', 9:'ט', 8:'ח', 7:'ז', 6:'ו', 5:'ה', 4:'ד', 3:'ג', 2:'ב', 1:'א' };
        let result = '';
        if (num === 15) return 'טו';
        if (num === 16) return 'טז';
        for (let val of Object.keys(letters).sort((a, b) => b - a)) {
            while (num >= val) { result += letters[val]; num -= val; }
        }
        return result;
    }

    function updateClock() {
        const now = new Date();
        const hebDate = new Intl.DateTimeFormat('he-u-ca-hebrew', {day:'numeric', month:'long', year:'numeric'}).format(now);
        const parts = hebDate.split(' ');
        const dayG = toGematria(parseInt(parts[0]));
        const yearG = "התש" + toGematria(parseInt(parts[2]) % 100);
        document.getElementById("clock-gregorian").innerText = now.toLocaleDateString('he-IL');
        document.getElementById("clock-hebrew").innerText = `${dayG} ${parts[1]} ${yearG} | ${now.toLocaleTimeString('he-IL')}`;
    }

    async function fetchNews() {
        try {
            const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
            const data = await res.json();
            if (!data) return;
            
            document.getElementById("feed").innerHTML = data.map(item => {
                const time = new Date(item.pubDate).toLocaleTimeString("he-IL", {hour: "2-digit", minute: "2-digit"});
                const src = (item.source || "").toLowerCase();
                const title = item.title || "";
                
                let color = "#666", label = "מבזק";
                
                // זיהוי רוטר (בדיקה גם במקור וגם בכותרת)
                if (src.includes("rotter") || src.includes("רוטר") || title.includes("רוטר")) { 
                    color = "#d35400"; label = "רוטר"; 
                }
                else if (src.includes("7") || src.includes("inn")) { 
                    color = "#ff8c00"; label = "ערוץ 7"; 
                }
                else if (src.includes("ynet")) { 
                    color = "#ed1c24"; label = "Ynet"; 
                }
                
                return `<a href="${item.link}" target="_blank" class="news-item" style="border-right-color: ${color}">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <span class="badge" style="background:${color}">${label}</span>
                        <span style="color:#5dade2; font-weight:bold;">${time}</span>
                    </div>
                    <div>${title}</div>
                </a>`;
            }).join("");
        } catch (e) {}
    }

    updateClock();
    fetchNews();
    setInterval(updateClock, 1000);
    setInterval(fetchNews, 60000);
</script>
</body>
</html>
