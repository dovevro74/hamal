<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 חמ"ל מבזקים וחירום</title>
    <style>
        :root {
            --bg-side: #f0f2f5;
            --text-main: #1c1e21;
            --item-bg: #ffffff;
            --header-bg: #2c3e50;
        }

        body.dark-mode {
            --bg-side: #1a1a1a;
            --text-main: #e4e6eb;
            --item-bg: #242526;
            --header-bg: #000000;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #000; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; color: white; }
        
        /* סרגל עליון נקי */
        .top-bar { background: #111; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; font-size: 1rem; z-index: 1000; }
        #weather { color: #3498db; font-weight: bold; }
        #clock { color: #f1c40f; font-weight: bold; text-align: left; }

        .main-layout { display: flex; flex: 1; overflow: hidden; width: 100%; }
        
        /* עמודת מבזקים */
        .news-side { width: 400px; min-width: 400px; background: var(--bg-side); display: flex; flex-direction: column; border-left: 4px solid #333; transition: 0.3s; }
        
        /* עמודת מפה */
        .map-side { flex: 1; background: #000; position: relative; }

        .header { background: var(--header-bg); color: white; padding: 12px; text-align: center; margin: 0; font-size: 1.1rem; border-bottom: 2px solid #111; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .refresh-btn { background: #34495e; color: white; border: 1px solid #eee; padding: 3px 8px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }

        #feed { flex: 1; overflow-y: auto; padding: 15px; background: var(--bg-side); }
        .news-item { background: var(--item-bg); color: var(--text-main); display: block; text-decoration: none; padding: 15px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); border-right: 10px solid #ccc; transition: 0.2s; }
        
        .meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .badge { font-size: 0.75rem; font-weight: bold; padding: 3px 8px; border-radius: 4px; color: white; }
        .time { font-size: 0.85rem; font-weight: bold; color: #1240dd; }
        body.dark-mode .time { color: #5dade2; }
        .title { font-size: 1rem; line-height: 1.4; font-weight: 600; display: block; }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .news-side { width: 100%; height: 45vh; min-width: 100%; border-left: none; border-bottom: 4px solid #333; }
        }
    </style>
</head>
<body class="dark-mode">

<div class="top-bar">
    <div id="weather">טוען מזג אוויר...</div>
    <div id="clock">טוען זמן...</div>
</div>

<div class="main-layout">
    <div class="news-side">
        <h2 class="header">מבזקי חדשות <button class="refresh-btn" onclick="fetchNews()">🔄 רענן</button></h2>
        <div id="feed">טוען מבזקים...</div>
    </div>

    <div class="map-side">
        <h2 class="header" style="background: #8e44ad;">מפת צבע אדום בזמן אמת</h2>
        <iframe src="https://www.tzevaadom.co.il/" style="width:100%; height:100%; border:none;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>
</div>

    // שעון ותאריך (ללא הקוד שנשפך)
    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        
        // תאריך עברי פשוט דרך Intl (עובד מצוין בדפדפנים מודרניים)
        const hebrewDate = new Intl.DateTimeFormat('he-IL-u-ca-hebrew', {day:'numeric', month:'long', year:'numeric'}).format(now);
        
        document.getElementById('clock').innerHTML = hebrewDate + " | " + timeStr;
        
        // מצב לילה אוטומטי (18:00 עד 06:00)
        const hour = now.getHours();
        if (hour >= 18 || hour < 6) { document.body.classList.add('dark-mode'); } 
        else { document.body.classList.remove('dark-mode'); }
    }
