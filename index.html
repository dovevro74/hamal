<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חמ"ל מבצעי מעודכן</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --border: #333; }
        body { font-family: system-ui, sans-serif; background: #000; margin: 0; color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .top-bar { height: 65px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--border); }
        #clock-hebrew { color: #f1c40f; font-weight: bold; font-size: 1rem; }
        #weather { color: #3498db; font-weight: bold; }

        .main-layout { display: flex; flex: 1; position: relative; overflow: hidden; }
        
        /* פאנל מבזקים */
        .news-side { width: 400px; background: var(--bg); display: flex; flex-direction: column; border-left: 2px solid var(--border); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        .news-side.hidden { margin-right: -400px; }

        #feed { flex: 1; overflow-y: auto; padding: 12px; }
        .news-item { background: var(--panel); padding: 12px; border-radius: 8px; margin-bottom: 10px; text-decoration: none; color: inherit; display: block; border-right: 5px solid #444; }
        
        /* כפתור הסתרה/הצגה */
        #toggle-btn { 
            position: absolute; top: 15px; right: 15px; z-index: 100;
            background: #333; color: white; border: 1px solid #555;
            border-radius: 50%; width: 35px; height: 35px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }

        .badge { padding: 2px 6px; border-radius: 4px; color: white; font-weight: bold; font-size: 0.75rem; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="weather">🌡️ טוען...</div>
    <div style="text-align: left;">
        <div id="clock-gregorian" style="color:#888; font-size:0.75rem"></div>
        <div id="clock-hebrew"></div>
    </div>
</div>

<div class="main-layout">
    <div class="news-side" id="newsSide">
        <div style="padding:12px; background:#000; text-align:center; font-weight:bold; border-bottom:1px solid var(--border);">📢 מבזקים</div>
        <div id="feed">טוען נתונים...</div>
    </div>

    <div style="flex:1; position:relative;">
        <button id="toggle-btn" onclick="toggleNews()">></button>
        <iframe src="https://www.tzevaadom.co.il/"></iframe>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4ncDieZ3xZKsaBVMbXt6vQkyyWaEFeyt4uWlx9JBIdvi5rS4G4w-HUXKx9MjpMCH4/exec";

    function toGematria(num) {
        if (num === 15) return 'טו'; if (num === 16) return 'טז';
        const letters = { 400:'ת', 300:'ש', 200:'ר', 100:'ק', 90:'צ', 80:'פ', 70:'ע', 60:'ס', 50:'נ', 40:'מ', 30:'ל', 20:'כ', 10:'י', 9:'ט', 8:'ח', 7:'ז', 6:'ו', 5:'ה', 4:'ד', 3:'ג', 2:'ב', 1:'א' };
        let res = '';
        for (let val of Object.keys(letters).sort((a,b)=>b-a)) {
            while (num >= val) { res += letters[val]; num -= val; }
        }
        return res;
    }

    function updateClock() {
        const now = new Date();
        const heb = new Intl.DateTimeFormat('he-u-ca-hebrew', {day:'numeric', month:'long', year:'numeric'}).format(now).split(' ');
        document.getElementById("clock-gregorian").innerText = now.toLocaleDateString('he-IL') + " | " + now.toLocaleTimeString('he-IL');
        document.getElementById("clock-hebrew").innerText = `${toGematria(parseInt(heb[0]))} ${heb[1]} ${"התש" + toGematria(parseInt(heb[2]) % 100)}`;
    }

    function toggleNews() {
        const side = document.getElementById("newsSide");
        const btn = document.getElementById("toggle-btn");
        const isHidden = side.classList.toggle("hidden");
        btn.innerText = isHidden ? "<" : ">";
    }

    async function fetchNews() {
        try {
            const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
            let data = await res.json();
            
            // מיון לפי זמן
            data.sort((a, b) => b.timestamp - a.timestamp);

            document.getElementById("feed").innerHTML = data.map(item => {
                const time = new Date(item.timestamp).toLocaleTimeString("he-IL", {hour: "2-digit", minute: "2-digit"});
                const src = (item.source || "").toLowerCase();
                let color = "#555", label = "מבזק";
                
                if (src.includes("רוטר")) { color = "#d35400"; label = "רוטר"; }
                else if (src.includes("7") || src.includes("inn")) { color = "#ff8c00"; label = "ערוץ 7"; }
                else if (src.includes("ynet")) { color = "#ed1c24"; label = "Ynet"; }

                return `
                    <a href="${item.link}" target="_blank" class="news-item" style="border-right-color: ${color}">
                        <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                            <span class="badge" style="background:${color}">${label}</span>
                            <span style="color:#3498db; font-weight:bold; font-size:0.85rem;">${time}</span>
                        </div>
                        <div style="font-size:0.95rem; line-height:1.4;">${item.title}</div>
                    </a>`;
            }).join("");
        } catch (e) {}
    }

    async function fetchWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=32.08&longitude=34.78&current_weather=true");
            const d = await res.json();
            document.getElementById("weather").innerText = `🌡️ תל אביב: ${Math.round(d.current_weather.temperature)}°C`;
        } catch (e) {}
    }

    updateClock(); fetchWeather(); fetchNews();
    setInterval(updateClock, 1000);
    setInterval(fetchNews, 45000);
</script>
</body>
</html>
