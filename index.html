<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 חמ"ל מבצעי - גרסת מבזקים ומפה</title>
    <style>
        :root { --bg: #1a1a1a; --panel: #242526; --text: #e4e6eb; --accent: #3498db; --header: #000000; }
        body { font-family: system-ui, sans-serif; background: #000; margin: 0; padding: 0; height: 100vh; color: white; overflow: hidden; display: flex; flex-direction: column; }
        
        /* סרגל עליון */
        .top-bar { height: 70px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid #444; flex-shrink: 0; }
        #weather { color: var(--accent); font-weight: bold; font-size: 1.1rem; }
        #clock-hebrew { color: #f1c40f; font-weight: bold; font-size: 1.1rem; }
        #clock-gregorian { color: #888; font-size: 0.8rem; text-align: left; }

        .main-layout { display: flex; flex: 1; position: relative; overflow: hidden; }
        
        /* צד המבזקים - הורחב לניצול שטח טוב יותר */
        .news-side { width: 450px; background: var(--bg); display: flex; flex-direction: column; border-left: 4px solid #333; transition: 0.3s ease; }
        .news-side.hidden { margin-right: -450px; }

        .section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: var(--header); padding: 15px; text-align: center; font-size: 1.1rem; border-bottom: 2px solid #444; font-weight: bold; color: #fff; }

        #feed { flex: 1; overflow-y: auto; padding: 15px; }
        .news-item { background: var(--panel); padding: 15px; border-radius: 8px; margin-bottom: 12px; border-right: 6px solid #666; text-decoration: none; color: var(--text); display: block; transition: 0.2s; }
        .news-item:hover { background: #303132; }
        
        .meta { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 8px; }
        .badge { padding: 3px 8px; border-radius: 4px; color: white; font-weight: bold; }
        .time-tag { color: #5dade2; font-weight: bold; }

        /* צד המפה */
        .map-side { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        #toggle-btn { 
            position: absolute; top: 15px; right: 15px; z-index: 1000; 
            background: #2c3e50; color: white; border: 2px solid #fff; 
            border-radius: 50%; width: 45px; height: 45px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="weather">🌡️ טוען מזג אוויר...</div>
    <div id="clock-container">
        <div id="clock-gregorian">--/--/----</div>
        <div id="clock-hebrew">טוען תאריך עברי...</div>
    </div>
</div>

<div class="main-layout">
    <div class="news-side" id="newsSide">
        <div class="section">
            <div class="header">📢 מבזקי חדשות בזמן אמת</div>
            <div id="feed">מעדכן נתונים...</div>
        </div>
    </div>

    <div class="map-side">
        <button id="toggle-btn" onclick="toggleNews()">></button>
        <iframe src="https://www.tzevaadom.co.il/"></iframe>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4ncDieZ3xZKsaBVMbXt6vQkyyWaEFeyt4uWlx9JBIdvi5rS4G4w-HUXKx9MjpMCH4/exec";

    function toGematria(num) {
        const letters = { 400:'ת', 300:'ש', 200:'ר', 100:'ק', 90:'צ', 80:'פ', 70:'ע', 60:'ס', 50:'נ', 40:'מ', 30:'ל', 20:'כ', 10:'י', 9:'ט', 8:'ח', 7:'ז', 6:'ו', 5:'ה', 4:'ד', 3:'ג', 2:'ב', 1:'א' };
        let result = '';
        if (num === 15) return 'טו';
        if (num === 16) return 'טז';
        for (let val of Object.keys(letters).sort((a, b) => b - a)) {
            while (num >= val) { result += letters[val]; num -= val; }
        }
        return result;
    }

    function updateClock() {
        const now = new Date();
        const hebDate = new Intl.DateTimeFormat('he-u-ca-hebrew', {day:'numeric', month:'long', year:'numeric'}).format(now);
        const parts = hebDate.split(' ');
        const dayG = toGematria(parseInt(parts[0]));
        const yearG = "התש" + toGematria(parseInt(parts[2]) % 100);
        
        document.getElementById("clock-gregorian").innerText = now.toLocaleDateString('he-IL');
        document.getElementById("clock-hebrew").innerText = `${dayG} ${parts[1]} ${yearG} | ${now.toLocaleTimeString('he-IL')}`;
    }

    async function fetchNews() {
        try {
            const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
            const data = await res.json();
            if (!data || data.length === 0) return;

            document.getElementById("feed").innerHTML = data.map(item => {
                const time = new Date(item.pubDate).toLocaleTimeString("he-IL", {hour: "2-digit", minute: "2-digit"});
                const src = (item.source || "").toLowerCase();
                const title = (item.title || "");
                const link = (item.link || "");
                
                let color = "#666", label = "מבזק";
                
                // לוגיקת זיהוי רוטר משופרת (מקור, כותרת או לינק)
                if (src.includes("rotter") || src.includes("רוטר") || title.includes("רוטר") || link.includes("rotter.net")) { 
                    color = "#d35400"; label = "רוטר"; 
                }
                else if (src.includes("7") || src.includes("inn") || link.includes("inn.co.il")) { 
                    color = "#ff8c00"; label = "ערוץ 7"; 
                }
                else if (src.includes("ynet") || link.includes("ynet.co.il")) { 
                    color = "#ed1c24"; label = "Ynet"; 
                }
                
                return `<a href="${link}" target="_blank" class="news-item" style="border-right-color: ${color}">
                    <div class="meta">
                        <span class="badge" style="background:${color}">${label}</span>
                        <span class="time-tag">${time}</span>
                    </div>
                    <div class="title">${title}</div>
                </a>`;
            }).join("");
        } catch (e) {
            console.error("News fetch error:", e);
        }
    }

    async function fetchWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=32.08&longitude=34.78&current_weather=true");
            const data = await res.json();
            document.getElementById("weather").innerText = `🌡️ ${Math.round(data.current_weather.temperature)}°C`;
        } catch(e) {}
    }

    function toggleNews() {
        const side = document.getElementById("newsSide");
        const btn = document.getElementById("toggle-btn");
        const isHidden = side.classList.toggle("hidden");
        btn.innerText = isHidden ? "<" : ">";
    }

    updateClock();
    fetchWeather();
    fetchNews();
    setInterval(updateClock, 1000);
    setInterval(fetchNews, 60000); // רענון מבזקים כל דקה
</script>

</body>
</html>
