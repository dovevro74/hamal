<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 חמ"ל מבזקים וחירום</title>
    <style>
        /* הגדרות כלליות */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; color: white; }
        
        /* מבנה החמ"ל - 2 עמודות */
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        
        /* צד המבזקים - רחב וקריא */
        .news-side { width: 450px; background: #f0f2f5; display: flex; flex-direction: column; border-left: 4px solid #333; }
        
        /* צד המפה - תופס את שאר המסך */
        .map-side { flex: 1; background: #000; position: relative; }

        /* כותרות */
        .header { background: #2c3e50; color: white; padding: 15px; text-align: center; margin: 0; font-size: 1.2rem; border-bottom: 2px solid #1a1a1a; display: flex; justify-content: center; align-items: center; gap: 12px; }
        .refresh-btn { background: #34495e; color: white; border: 1px solid #ecf0f1; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        .refresh-btn:hover { background: #1abc9c; }

        /* עיצוב רשימת המבזקים */
        #feed { flex: 1; overflow-y: auto; padding: 15px; background: #e9ecef; }
        .news-item { background: white; display: block; text-decoration: none; padding: 15px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); transition: 0.2s; border-right: 10px solid #ccc; }
        .news-item:hover { transform: translateX(-5px); box-shadow: 0 5px 12px rgba(0,0,0,0.15); }
        
        .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .badge { font-size: 0.8rem; font-weight: bold; padding: 4px 10px; border-radius: 5px; color: white; }
        .time { font-size: 0.9rem; color: #1240dd; font-weight: bold; }
        .title { color: #1c1e21; font-size: 1rem; line-height: 1.5; font-weight: 600; display: block; }

        /* התאמה לטאבלט ונייד */
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; overflow-y: auto; }
            .news-side { width: 100%; height: 50vh; border-left: none; border-bottom: 5px solid #333; }
            .map-side { width: 100%; height: 50vh; }
        }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="news-side">
        <h2 class="header">
            מבזקי חדשות
            <button class="refresh-btn" onclick="fetchNews()">🔄 רענן ידנית</button>
        </h2>
        <div id="feed">טוען מבזקים אחרונים...</div>
    </div>

    <div class="map-side">
        <h2 class="header" style="background: #8e44ad;">מפת צבע אדום בזמן אמת</h2>
        <iframe src="https://www.tzevaadom.co.il/" 
                style="width:100%; height:100%; border:none;" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
        </iframe>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4ncDieZ3xZKsaBVMbXt6vQkyyWaEFeyt4uWlx9JBIdvi5rS4G4w-HUXKx9MjpMCH4/exec';
    
    // מילון צבעים קבוע למבזקים
    const config = {
        'Rotter': { color: '#d35400', label: 'רוטר' },
        'Ynet': { color: '#ed1c24', label: 'Ynet' },
        'Inn': { color: '#f39c12', label: 'ערוץ 7' },
        'default': { color: '#666', label: 'מבזק' }
    };

    async function fetchNews() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            const feed = document.getElementById('feed');
            
            if (!data || data.length === 0) return;

            feed.innerHTML = data.map(item => {
                const timeStr = new Date(item.pubDate).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
                const sourceInfo = config[item.source] || config['default'];

                return `
                    <a href="${item.link}" target="_blank" class="news-item" style="border-right-color: ${sourceInfo.color};">
                        <div class="meta">
                            <span class="badge" style="background-color: ${sourceInfo.color};">${sourceInfo.label}</span>
                            <span class="time">${timeStr}</span>
                        </div>
                        <span class="title">${item.title}</span>
                    </a>`;
            }).join('');
        } catch (e) { 
            console.error(e);
            document.getElementById('feed').innerHTML = "שגיאה בחיבור למקור המבזקים. נסה לרענן.";
        }
    }

    // הפעלה ראשונה ורענון אוטומטי כל דקה
    fetchNews();
    setInterval(fetchNews, 60000);
</script>

</body>
</html>
