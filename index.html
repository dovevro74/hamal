<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 חמ"ל מבזקים וחירום</title>
    <style>
        :root {
            --bg-side: #f0f2f5;
            --text-main: #1c1e21;
            --item-bg: #ffffff;
            --header-bg: #2c3e50;
        }

        body.dark-mode {
            --bg-side: #1a1a1a;
            --text-main: #e4e6eb;
            --item-bg: #242526;
            --header-bg: #000000;
        }

        body { font-family: system-ui, -apple-system, sans-serif; background: #000; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; color: white; }
        
        .top-bar { background: #111; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; z-index: 2000; }
        .top-left { display: flex; align-items: center; gap: 15px; }
        
        #weather { color: #3498db; font-weight: bold; }
        #clock { color: #f1c40f; font-weight: bold; text-align: left; line-height: 1.2; }
        .btn-ui { background: #34495e; color: white; border: 1px solid #777; padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }

        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .news-side { width: 420px; min-width: 420px; background: var(--bg-side); display: flex; flex-direction: column; border-left: 4px solid #333; transition: margin-right 0.4s ease; z-index: 10; }
        .news-side.hidden { margin-right: -420px; min-width: 0; }

        .map-side { flex: 1; background: #000; position: relative; }

        #toggle-btn {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            z-index: 1001;
            background: #2c3e50;
            color: white;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
            font-size: 1.2rem;
        }

        .header { background: var(--header-bg); color: white; padding: 12px; text-align: center; margin: 0; border-bottom: 2px solid #111; display: flex; justify-content: center; align-items: center; gap: 10px; }

        #feed { flex: 1; overflow-y: auto; padding: 15px; background: var(--bg-side); }
        .news-item { background: var(--item-bg); color: var(--text-main); display: block; text-decoration: none; padding: 15px; border-radius: 10px; margin-bottom: 12px; border-right: 12px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: transform 0.1s; }
        .news-item:active { transform: scale(0.98); }
        
        .meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .badge { font-size: 0.75rem; font-weight: bold; padding: 3px 8px; border-radius: 4px; color: white; }
        .time { font-size: 0.85rem; font-weight: bold; color: #1240dd; }
        body.dark-mode .time { color: #5dade2; }
        .title { font-size: 1rem; line-height: 1.4; font-weight: 600; display: block; }

        @media (max-width: 900px) {
            .news-side { width: 100%; height: 40vh; min-width: 100%; }
            .news-side.hidden { margin-right: 0; margin-top: -40vh; }
        }
    </style>
</head>
<body class="dark-mode">

<div class="top-bar">
    <div class="top-left">
        <div id="weather">טוען...</div>
        <button class="btn-ui" onclick="toggleDark()">🌓 החלף צבע</button>
    </div>
    <div id="clock">טוען זמן...</div>
</div>

<div class="main-layout">
    <div class="news-side" id="newsSide">
        <h2 class="header">מבזקי חדשות <button class="btn-ui" onclick="fetchNews()">🔄 רענן</button></h2>
        <div id="feed">מבזקים בטעינה...</div>
    </div>

    <div class="map-side">
        <div id="toggle-btn" onclick="toggleNews()">▶</div>
        <h2 class="header" style="background: #8e44ad;">מפת צבע אדום בזמן אמת</h2>
        <iframe src="https://www.tzevaadom.co.il/" style="width:100%; height:100%; border:none;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>
</div>

        try {
            const now = new Date();

            // שימוש ב-Intl עבור תאריך עברי (יום בחודש ומקור)
            const hebDayMonth = new Intl.DateTimeFormat("he-u-ca-hebrew", {day:"numeric", month:"long"}).format(now);

            const hebYear = (new Intl.DateTimeFormat("he-u-ca-hebrew", {year:"numeric"}).format(now)).replace(/[0-9]/g, '');
            // תיקון ידני נפוץ לשנה הנוכחית במידת הצורך בגלל וריאציות דפדפן
            const displayYear = "התשפ\"ו"; 

            document.getElementById("clock").innerHTML = 
                `<span style="font-size:0.85rem; color:#bbb;">${gregDate}</span><br>${hebDayMonth} ${displayYear} | ${timeStr}`;
        } catch (e) { console.log("Clock error", e); }
    }

        document.body.classList.toggle("dark-mode");
    }
