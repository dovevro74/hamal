<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 חמ"ל מבצעי - רוטר מתוקן</title>
    <style>
        :root { --bg: #1a1a1a; --panel: #242526; --text: #e4e6eb; --rotter: #d35400; }
        body { font-family: system-ui, sans-serif; background: #000; margin: 0; padding: 0; height: 100vh; color: white; overflow: hidden; display: flex; flex-direction: column; }
        
        .top-bar { height: 70px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid #444; flex-shrink: 0; }
        #clock-hebrew { color: #f1c40f; font-weight: bold; font-size: 1.1rem; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .news-side { width: 450px; background: var(--bg); display: flex; flex-direction: column; border-left: 4px solid #333; }
        .header { background: #000; padding: 15px; text-align: center; font-size: 1.1rem; border-bottom: 2px solid #444; font-weight: bold; }

        #feed { flex: 1; overflow-y: auto; padding: 15px; }
        .news-item { background: var(--panel); padding: 12px; border-radius: 8px; margin-bottom: 10px; text-decoration: none; color: var(--text); display: block; border-right: 6px solid #666; }
        .badge { padding: 2px 8px; border-radius: 4px; color: white; font-weight: bold; font-size: 0.85rem; }
        
        .map-side { flex: 1; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="weather">🌡️ טוען...</div>
    <div id="clock-container">
        <div id="clock-gregorian" style="color:#888; font-size:0.8rem"></div>
        <div id="clock-hebrew"></div>
    </div>
</div>

<div class="main-layout">
    <div class="news-side">
        <div class="header">📢 מבזקי חדשות</div>
        <div id="feed">ממתין לנתונים מרוטר...</div>
    </div>
    <div class="map-side">
        <iframe src="https://www.tzevaadom.co.il/"></iframe>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4ncDieZ3xZKsaBVMbXt6vQkyyWaEFeyt4uWlx9JBIdvi5rS4G4w-HUXKx9MjpMCH4/exec";

    function toGematria(num) {
        const letters = { 400:'ת', 300:'ש', 200:'ר', 100:'ק', 90:'צ', 80:'פ', 70:'ע', 60:'ס', 50:'נ', 40:'מ', 30:'ל', 20:'כ', 10:'י', 9:'ט', 8:'ח', 7:'ז', 6:'ו', 5:'ה', 4:'ד', 3:'ג', 2:'ב', 1:'א' };
        let result = '';
        if (num === 15) return 'טו'; if (num === 16) return 'טז';
        for (let val of Object.keys(letters).sort((a, b) => b - a)) {
            while (num >= val) { result += letters[val]; num -= val; }
        }
        return result;
    }

    function updateClock() {
        const now = new Date();
        const hebDate = new Intl.DateTimeFormat('he-u-ca-hebrew', {day:'numeric', month:'long', year:'numeric'}).format(now);
        const parts = hebDate.split(' ');
        const yearG = "התש" + toGematria(parseInt(parts[2]) % 100);
        document.getElementById("clock-gregorian").innerText = now.toLocaleDateString('he-IL');
        document.getElementById("clock-hebrew").innerText = `${toGematria(parseInt(parts[0]))} ${parts[1]} ${yearG} | ${now.toLocaleTimeString('he-IL')}`;
    }

    async function fetchNews() {
        try {
            const response = await fetch(SCRIPT_URL + "?nocache=" + Date.now());
            const data = await response.json();
            if (!data || data.length === 0) return;

            document.getElementById("feed").innerHTML = data.map(item => {
                const time = new Date(item.pubDate).toLocaleTimeString("he-IL", {hour: "2-digit", minute: "2-digit"});
                const link = (item.link || "").toLowerCase();
                const source = (item.source || "").toLowerCase();

                let color = "#666", label = "מבזק";

                // זיהוי רוטר לפי הכתובת החדשה והמקור
                if (link.includes("rotter.net") || source.includes("רוטר") || source.includes("rotter")) {
                    color = "#d35400"; label = "רוטר";
                } else if (link.includes("ynet")) {
                    color = "#ed1c24"; label = "Ynet";
                }

                return `
                    <a href="${item.link}" target="_blank" class="news-item" style="border-right-color: ${color}">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span class="badge" style="background:${color}">${label}</span>
                            <span style="color:#5dade2; font-weight:bold;">${time}</span>
                        </div>
                        <div>${item.title}</div>
                    </a>`;
            }).join("");
        } catch (e) { console.error(e); }
    }

    updateClock();
    fetchNews();
    setInterval(updateClock, 1000);
    setInterval(fetchNews, 45000);
</script>
</body>
</html>
