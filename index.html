<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>🚨 חמ"ל מבצעי - גרסה מתוקנת</title>
    <style>
        :root { --bg: #000; --panel: #1c1c1e; --text: #fff; --rotter: #d35400; --ynet: #ed1c24; --inn: #ff8c00; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { height: 65px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid #333; }
        #weather { font-weight: bold; color: #0a84ff; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .news-side { width: 420px; background: #121212; display: flex; flex-direction: column; border-left: 3px solid #333; }
        #feed { flex: 1; overflow-y: auto; padding: 10px; }
        .news-item { background: var(--panel); margin-bottom: 8px; padding: 12px; border-radius: 8px; text-decoration: none; color: inherit; display: block; border-right: 5px solid #444; }
        .item-meta { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem; }
        .badge { padding: 2px 6px; border-radius: 4px; color: #fff; font-weight: bold; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="weather">🌡️ טוען מזג אוויר...</div>
    <div style="text-align: left;">
        <div id="clock-hebrew" style="color: #ffd60a; font-weight: bold;"></div>
        <div id="clock-gregorian" style="color: #888; font-size: 0.8rem;"></div>
    </div>
</div>

<div class="main-layout">
    <div class="news-side">
        <div style="padding:15px; background:#000; text-align:center; font-weight:bold; border-bottom:1px solid #333;">📢 מבזקים לפי זמן (רוטר/Ynet/7)</div>
        <div id="feed">טוען...</div>
    </div>
    <div style="flex:1;"><iframe src="https://www.tzevaadom.co.il/"></iframe></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4ncDieZ3xZKsaBVMbXt6vQkyyWaEFeyt4uWlx9JBIdvi5rS4G4w-HUXKx9MjpMCH4/exec";

    async function fetchWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=32.08&longitude=34.78&current_weather=true");
            const data = await res.json();
            document.getElementById("weather").innerText = `🌡️ תל אביב: ${Math.round(data.current_weather.temperature)}°C`;
        } catch (e) { document.getElementById("weather").innerText = "🌡️ מזג אוויר לא זמין"; }
    }

    async function fetchNews() {
        try {
            const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
            const data = await res.json();
            if (!data) return;

            document.getElementById("feed").innerHTML = data.map(item => {
                const time = new Date(item.pubDate).toLocaleTimeString("he-IL", {hour: "2-digit", minute: "2-digit"});
                const src = (item.source || "").toLowerCase();
                const link = (item.link || "").toLowerCase();
                
                let color = "#666", label = "מבזק";
                if (src.includes("רוטר") || link.includes("rotter")) { color = "var(--rotter)"; label = "רוטר"; }
                else if (src.includes("7") || link.includes("inn")) { color = "var(--inn)"; label = "ערוץ 7"; }
                else if (src.includes("ynet")) { color = "var(--ynet)"; label = "Ynet"; }

                return `
                    <a href="${item.link}" target="_blank" class="news-item" style="border-right-color: ${color}">
                        <div class="item-meta">
                            <span class="badge" style="background:${color}">${label}</span>
                            <span style="color:#0a84ff; font-weight:bold;">${time}</span>
                        </div>
                        <div style="font-size:0.95rem;">${item.title}</div>
                    </a>`;
            }).join("");
        } catch (e) {}
    }

    function updateClock() {
        const now = new Date();
        const hebDate = new Intl.DateTimeFormat('he-u-ca-hebrew', {day:'numeric', month:'long', year:'numeric'}).format(now);
        document.getElementById("clock-gregorian").innerText = now.toLocaleDateString('he-IL') + " | " + now.toLocaleTimeString('he-IL');
        document.getElementById("clock-hebrew").innerText = hebDate;
    }

    setInterval(updateClock, 1000);
    setInterval(fetchNews, 45000);
    updateClock(); fetchNews(); fetchWeather();
</script>
</body>
</html>
