<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 חמ"ל מבזקים וחירום</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; color: white; }
        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* צד המבזקים */
        .news-side { 
            width: 450px; 
            background: #f0f2f5; 
            display: flex; 
            flex-direction: column; 
            border-left: 4px solid #333; 
            transition: all 0.3s ease; /* אנימציה חלקה לסגירה */
        }
        
        /* מחלקה להסתרה */
        .news-side.hidden {
            width: 0;
            overflow: hidden;
            border: none;
        }

        /* צד המפה */
        .map-side { flex: 1; background: #000; position: relative; }

        /* כפתור החץ להסתרה */
        #toggle-btn {
            position: absolute;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            z-index: 1000;
            background: #2c3e50;
            color: white;
            border: 2px solid #333;
            border-radius: 5px 0 0 5px;
            padding: 15px 5px;
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: -2px 0 5px rgba(0,0,0,0.5);
            transition: right 0.3s ease;
        }
        
        /* הזזת הכפתור כשהמבזקים מוסתרים */
        .hidden-mode #toggle-btn {
            right: 0;
            border-radius: 0 5px 5px 0;
            left: 0;
            width: 30px;
        }

        .header { background: #2c3e50; color: white; padding: 15px; text-align: center; margin: 0; font-size: 1.2rem; border-bottom: 2px solid #1a1a1a; display: flex; justify-content: center; align-items: center; gap: 12px; }
        .refresh-btn { background: #34495e; color: white; border: 1px solid #ecf0f1; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }

        #feed { flex: 1; overflow-y: auto; padding: 15px; background: #e9ecef; }
        .news-item { background: white; display: block; text-decoration: none; padding: 15px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); border-right: 12px solid #ccc; transition: 0.2s; }
        .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .badge { font-size: 0.8rem; font-weight: bold; padding: 4px 10px; border-radius: 5px; color: white; }
        .time { font-size: 0.9rem; color: #1240dd; font-weight: bold; }
        .title { color: #1c1e21; font-size: 1.05rem; line-height: 1.5; font-weight: 600; display: block; }

        @media (max-width: 900px) {
            .news-side { width: 100%; height: 50vh; }
            .news-side.hidden { height: 0; width: 100%; }
            #toggle-btn { top: 0; right: 50%; transform: translateX(50%); border-radius: 0 0 5px 5px; padding: 5px 20px; }
        }
    </style>
</head>
<body>

<div class="main-layout" id="container">
    <button id="toggle-btn" onclick="toggleNews()">◀</button>

    <div class="news-side" id="newsSide">
        <h2 class="header">מבזקי חדשות <button class="refresh-btn" onclick="fetchNews()">🔄 רענן</button></h2>
        <div id="feed">טוען מבזקים...</div>
    </div>

    <div class="map-side">
        <h2 class="header" style="background: #8e44ad;">מפת צבע אדום בזמן אמת</h2>
        <iframe src="https://www.tzevaadom.co.il/" style="width:100%; height:100%; border:none;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4ncDieZ3xZKsaBVMbXt6vQkyyWaEFeyt4uWlx9JBIdvi5rS4G4w-HUXKx9MjpMCH4/exec';
    
    // פונקציה להסתרת/הצגת המבזקים
    function toggleNews() {
        const newsSide = document.getElementById('newsSide');
        const btn = document.getElementById('toggle-btn');
        const container = document.getElementById('container');
        
        newsSide.classList.toggle('hidden');
        
        if (newsSide.classList.contains('hidden')) {
            btn.innerHTML = "▶"; // חץ לכיוון השני
            container.classList.add('hidden-mode');
        } else {
            btn.innerHTML = "◀";
            container.classList.remove('hidden-mode');
        }
    }

    function getSourceDetails(sourceName) {
        const name = (sourceName || "").toLowerCase().trim();
        if (name.includes('rotter')) return { label: 'רוטר', color: '#d35400' };
        if (name.includes('ynet'))   return { label: 'Ynet', color: '#ed1c24' };
        if (name.includes('inn') || name.includes('7')) return { label: 'ערוץ 7', color: '#f39c12' };
        return { label: 'מבזק', color: '#666' };
    }

    async function fetchNews() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            const feed = document.getElementById('feed');
            feed.innerHTML = data.map(item => {
                const timeStr = new Date(item.pubDate).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
                const source = getSourceDetails(item.source);
                return `
                    <a href="${item.link}" target="_blank" class="news-item" style="border-right-color: ${source.color};">
                        <div class="meta">
                            <span class="badge" style="background-color: ${source.color};">${source.label}</span>
                            <span class="time">${timeStr}</span>
                        </div>
                        <span class="title">${item.title}</span>
                    </a>`;
            }).join('');
        } catch (e) { console.error(e); }
    }

    fetchNews();
    setInterval(fetchNews, 60000);
</script>
</body>
</html>
