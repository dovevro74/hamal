<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חמ"ל מבצעי - תיקון 02:00 ורוטר</title>
    <style>
        :root { --bg: #1a1a1a; --panel: #242526; --text: #e4e6eb; }
        body { font-family: system-ui, sans-serif; background: #000; margin: 0; height: 100vh; color: white; overflow: hidden; display: flex; flex-direction: column; }
        .top-bar { height: 70px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid #444; }
        #clock-hebrew { color: #f1c40f; font-weight: bold; font-size: 1.1rem; }
        .main-layout { display: flex; flex: 1; position: relative; overflow: hidden; }
        .news-side { width: 420px; background: var(--bg); display: flex; flex-direction: column; border-left: 4px solid #333; transition: 0.3s; z-index: 10; }
        .news-side.hidden { margin-right: -420px; }
        #feed { flex: 1; overflow-y: auto; padding: 15px; }
        .news-item { background: var(--panel); padding: 12px; border-radius: 8px; margin-bottom: 10px; text-decoration: none; color: var(--text); display: block; border-right: 6px solid #666; }
        .map-side { flex: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        #toggle-btn { position: absolute; top: 15px; right: 15px; z-index: 100; background: #2c3e50; color: white; border: 2px solid white; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-weight: bold; }
        .badge { padding: 2px 8px; border-radius: 4px; color: white; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="weather" style="color: #3498db; font-weight: bold;">🌡️ טוען...</div>
    <div style="text-align: left;">
        <div id="clock-gregorian" style="color:#888; font-size:0.8rem"></div>
        <div id="clock-hebrew"></div>
    </div>
</div>

<div class="main-layout">
    <div class="news-side" id="newsSide">
        <div style="background:#000; padding:15px; text-align:center; font-weight:bold; border-bottom:1px solid #444;">📢 מבזקים בזמן אמת</div>
        <div id="feed">טוען מבזקים...</div>
    </div>
    <div class="map-side">
        <button id="toggle-btn" onclick="toggleNews()">></button>
        <iframe src="https://www.tzevaadom.co.il/"></iframe>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4ncDieZ3xZKsaBVMbXt6vQkyyWaEFeyt4uWlx9JBIdvi5rS4G4w-HUXKx9MjpMCH4/exec";

    function toGematria(num) {
        if (num === 15) return 'טו'; if (num === 16) return 'טז';
        const letters = { 400:'ת', 300:'ש', 200:'ר', 100:'ק', 90:'צ', 80:'פ', 70:'ע', 60:'ס', 50:'נ', 40:'מ', 30:'ל', 20:'כ', 10:'י', 9:'ט', 8:'ח', 7:'ז', 6:'ו', 5:'ה', 4:'ד', 3:'ג', 2:'ב', 1:'א' };
        let res = '';
        for (let val of Object.keys(letters).sort((a,b)=>b-a)) {
            while (num >= val) { res += letters[val]; num -= val; }
        }
        return res;
    }

    function updateClock() {
        const now = new Date();
        const heb = new Intl.DateTimeFormat('he-u-ca-hebrew', {day:'numeric', month:'long', year:'numeric'}).format(now).split(' ');
        document.getElementById("clock-gregorian").innerText = now.toLocaleDateString('he-IL') + " | " + now.toLocaleTimeString('he-IL');
        document.getElementById("clock-hebrew").innerText = `${toGematria(parseInt(heb[0]))} ${heb[1]} ${"התש" + toGematria(parseInt(heb[2]) % 100)}`;
    }

    function toggleNews() {
        const side = document.getElementById("newsSide");
        const btn = document.getElementById("toggle-btn");
        const isHidden = side.classList.toggle("hidden");
        btn.innerText = isHidden ? "<" : ">";
    }

    async function fetchNews() {
        try {
            const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
            const data = await res.json();
            document.getElementById("feed").innerHTML = data.map(item => {
                const time = new Date(item.timestamp).toLocaleTimeString("he-IL", {hour: "2-digit", minute: "2-digit"});
                const src = (item.source || "").toLowerCase();
                let color = "#666", label = "מבזק";
                if (src.includes("רוטר")) { color = "#d35400"; label = "רוטר"; }
                else if (src.includes("7") || src.includes("inn")) { color = "#ff8c00"; label = "ערוץ 7"; }
                else if (src.includes("ynet")) { color = "#ed1c24"; label = "Ynet"; }

                return `
                    <a href="${item.link}" target="_blank" class="news-item" style="border-right-color: ${color}">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span class="badge" style="background:${color}">${label}</span>
                            <span style="color:#3498db; font-weight:bold;">${time}</span>
                        </div>
                        <div>${item.title}</div>
                    </a>`;
            }).join("");
        } catch (e) {}
    }

    async function fetchWeather() {
        try {
            const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=32.08&longitude=34.78&current_weather=true");
            const d = await res.json();
            document.getElementById("weather").innerText = `🌡️ תל אביב: ${Math.round(d.current_weather.temperature)}°C`;
        } catch (e) {}
    }

    updateClock(); fetchWeather(); fetchNews();
    setInterval(updateClock, 1000);
    setInterval(fetchNews, 45000);
</script>
</body>
</html>
